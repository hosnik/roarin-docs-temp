<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a537"/>
      <stop offset="100%" style="stop-color:#f0c94b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="url(#gold)" font-size="24" font-weight="bold" filter="url(#glow)">THE DEN — Command Center</text>
  
  <!-- Deploy Desk -->
  <rect x="40" y="80" width="160" height="280" rx="8" fill="#1a1a2e" stroke="#d4a537" stroke-width="2"/>
  <rect x="40" y="80" width="160" height="40" rx="8" fill="#d4a537" fill-opacity="0.15"/>
  <text x="120" y="107" text-anchor="middle" fill="#d4a537" font-size="14" font-weight="bold">⚔️ Deploy Desk</text>
  <text x="120" y="145" text-anchor="middle" fill="#888" font-size="11">Select Monster</text>
  <text x="120" y="165" text-anchor="middle" fill="#888" font-size="11">Preview Config</text>
  <text x="120" y="185" text-anchor="middle" fill="#888" font-size="11">Allocate Capital</text>
  <text x="120" y="205" text-anchor="middle" fill="#888" font-size="11">Confirm Deploy</text>
  <line x1="70" y1="230" x2="170" y2="230" stroke="#333" stroke-width="1"/>
  <text x="120" y="260" text-anchor="middle" fill="#d4a537" font-size="10" font-style="italic">"Ready to send</text>
  <text x="120" y="275" text-anchor="middle" fill="#d4a537" font-size="10" font-style="italic">one of yours out?"</text>

  <!-- The Board -->
  <rect x="230" y="80" width="160" height="280" rx="8" fill="#1a1a2e" stroke="#d4a537" stroke-width="2"/>
  <rect x="230" y="80" width="160" height="40" rx="8" fill="#d4a537" fill-opacity="0.15"/>
  <text x="310" y="107" text-anchor="middle" fill="#d4a537" font-size="14" font-weight="bold">📊 The Board</text>
  <text x="310" y="145" text-anchor="middle" fill="#888" font-size="11">Active Deployments</text>
  <text x="310" y="165" text-anchor="middle" fill="#888" font-size="11">Live P&amp;L Tracking</text>
  <text x="310" y="185" text-anchor="middle" fill="#888" font-size="11">Position History</text>
  <text x="310" y="205" text-anchor="middle" fill="#888" font-size="11">Portfolio Overview</text>
  <line x1="260" y1="230" x2="360" y2="230" stroke="#333" stroke-width="1"/>
  <text x="310" y="260" text-anchor="middle" fill="#4ade80" font-size="12">+$47.20</text>
  <text x="310" y="280" text-anchor="middle" fill="#888" font-size="10">Total Portfolio</text>

  <!-- Recall Handler -->
  <rect x="420" y="80" width="160" height="280" rx="8" fill="#1a1a2e" stroke="#d4a537" stroke-width="2"/>
  <rect x="420" y="80" width="160" height="40" rx="8" fill="#d4a537" fill-opacity="0.15"/>
  <text x="500" y="107" text-anchor="middle" fill="#d4a537" font-size="14" font-weight="bold">🔄 Recall Handler</text>
  <text x="500" y="145" text-anchor="middle" fill="#888" font-size="11">View Performance</text>
  <text x="500" y="165" text-anchor="middle" fill="#888" font-size="11">Initiate Recall</text>
  <text x="500" y="185" text-anchor="middle" fill="#888" font-size="11">Close Positions</text>
  <text x="500" y="205" text-anchor="middle" fill="#888" font-size="11">Return to Party</text>
  <line x1="450" y1="230" x2="550" y2="230" stroke="#333" stroke-width="1"/>
  <text x="500" y="260" text-anchor="middle" fill="#fbbf24" font-size="10" font-style="italic">"Wrapping up</text>
  <text x="500" y="275" text-anchor="middle" fill="#fbbf24" font-size="10" font-style="italic">trades..."</text>

  <!-- Market Ticker -->
  <rect x="610" y="80" width="160" height="280" rx="8" fill="#1a1a2e" stroke="#d4a537" stroke-width="2"/>
  <rect x="610" y="80" width="160" height="40" rx="8" fill="#d4a537" fill-opacity="0.15"/>
  <text x="690" y="107" text-anchor="middle" fill="#d4a537" font-size="14" font-weight="bold">📈 Market Ticker</text>
  <text x="690" y="145" text-anchor="middle" fill="#888" font-size="11">Trending Markets</text>
  <text x="690" y="165" text-anchor="middle" fill="#888" font-size="11">Current Odds</text>
  <text x="690" y="185" text-anchor="middle" fill="#888" font-size="11">Edge Opportunities</text>
  <text x="690" y="205" text-anchor="middle" fill="#888" font-size="11">Affinity Filters</text>
  <line x1="640" y1="230" x2="740" y2="230" stroke="#333" stroke-width="1"/>
  <text x="690" y="255" text-anchor="middle" fill="#4ade80" font-size="10">NBA: LAL vs BOS</text>
  <text x="690" y="275" text-anchor="middle" fill="#888" font-size="10">Edge: 6.2%</text>
</svg>